<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留言板 | 风之画廊</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}
a { text-decoration: none; color: inherit; }

body {
    background: linear-gradient(135deg, #f5f7fa 0%, #e8f0f7 50%, #f0f4f8 100%);
    min-height: 100vh;
    padding-bottom: 60px;
    position: relative;
}
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, transparent 100%);
    pointer-events: none;
}

.container {
    max-width: 780px;
    margin: 0 auto;
    padding: 30px 24px;
    position: relative;
    z-index: 1;
}

/* 返回首页 */
.back-home {
    margin-bottom: 30px;
}
.back-home a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 20px;
    background: #fff;
    color: #667eea;
    border-radius: 20px;
    font-size: 13px;
    box-shadow: 0 2px 12px rgba(102, 126, 234, 0.12);
    transition: all 0.3s;
    font-weight: 500;
}
.back-home a:hover {
    transform: translateX(-3px);
    box-shadow: 0 4px 16px rgba(102, 126, 234, 0.2);
    background: #667eea;
    color: #fff;
}
.back-home a::before {
    content: "←";
    font-size: 14px;
    line-height: 1;
}

/* 页面标题 */
.page-header {
    text-align: center;
    margin-bottom: 40px;
}
.page-header h1 {
    font-size: 32px;
    color: #2d3748;
    letter-spacing: 4px;
    margin-bottom: 10px;
    font-weight: 500;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.page-header p {
    font-size: 14px;
    color: #a0aec0;
    letter-spacing: 2px;
}
.page-header p::before,
.page-header p::after {
    content: "✦";
    margin: 0 10px;
    font-size: 10px;
    color: #cbd5e0;
}

/* 留言统计 */
.msg-count {
    text-align: center;
    margin-bottom: 24px;
    font-size: 13px;
    color: #718096;
}
.msg-count strong {
    color: #667eea;
    font-size: 18px;
    margin: 0 4px;
    font-weight: 600;
}

/* 留言输入区域 */
.msg-input-box {
    background: #fff;
    padding: 28px;
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    margin-bottom: 36px;
    position: relative;
    overflow: hidden;
}
.msg-input-box::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
}
.msg-input-box h3 {
    font-size: 18px;
    color: #2d3748;
    margin-bottom: 20px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
}
.msg-input-box h3::before {
    content: "✎";
    font-size: 16px;
    color: #667eea;
}

.input-row {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
}
.input-row input {
    flex: 1;
}

input, textarea {
    width: 100%;
    display: block;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 14px;
    font-size: 14px;
    outline: none;
    transition: all 0.25s;
    background: #fafbfc;
    color: #2d3748;
    font-family: inherit;
}
input:focus, textarea:focus {
    border-color: #667eea;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}
input::placeholder, textarea::placeholder {
    color: #a0aec0;
}

textarea {
    min-height: 110px;
    resize: none;
    line-height: 1.7;
}

.btn-submit {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: 500;
    letter-spacing: 1px;
    box-shadow: 0 4px 14px rgba(102, 126, 234, 0.3);
}
.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}
.btn-submit:active {
    transform: translateY(0);
}

/* 留言列表 */
.msg-list {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.msg-item {
    background: #fff;
    padding: 22px 24px;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    display: flex;
    gap: 16px;
    transition: all 0.3s;
    position: relative;
    animation: msgIn 0.4s ease;
}
@keyframes msgIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
.msg-item:hover {
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    transform: translateY(-2px);
}

/* 头像 */
.msg-avatar {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.msg-content-wrap {
    flex: 1;
    min-width: 0;
}

.msg-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
}

.msg-name {
    font-size: 15px;
    font-weight: 600;
    color: #2d3748;
}

.msg-time {
    font-size: 12px;
    color: #a0aec0;
}

.msg-text {
    font-size: 14px;
    color: #4a5568;
    line-height: 1.8;
    word-break: break-word;
}

.btn-del {
    background: transparent;
    color: #cbd5e0;
    border: none;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
    margin-top: 10px;
}
.btn-del:hover {
    background: #fff5f5;
    color: #f56565;
}

/* 空状态 */
.empty-tip {
    text-align: center;
    padding: 80px 20px;
    color: #a0aec0;
}
.empty-tip .empty-icon {
    font-size: 60px;
    margin-bottom: 20px;
    opacity: 0.5;
}
.empty-tip p {
    font-size: 15px;
    line-height: 1.8;
}
.empty-tip .empty-sub {
    font-size: 13px;
    color: #cbd5e0;
    margin-top: 8px;
}

/* 头像颜色（根据昵称生成不同颜色） */
.avatar-color-0 { background: linear-gradient(135deg, #667eea, #764ba2); }
.avatar-color-1 { background: linear-gradient(135deg, #f093fb, #f5576c); }
.avatar-color-2 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.avatar-color-3 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
.avatar-color-4 { background: linear-gradient(135deg, #fa709a, #fee140); }
.avatar-color-5 { background: linear-gradient(135deg, #a8edea, #fed6e3); color: #666; }
.avatar-color-6 { background: linear-gradient(135deg, #ffecd2, #fcb69f); color: #666; }
.avatar-color-7 { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #666; }

/* 响应式 */
@media(max-width: 640px) {
    .container {
        padding: 20px 16px;
    }
    .page-header h1 {
        font-size: 24px;
        letter-spacing: 2px;
    }
    .page-header p {
        font-size: 12px;
    }
    .msg-input-box {
        padding: 20px;
        border-radius: 14px;
    }
    .msg-input-box h3 {
        font-size: 16px;
    }
    .input-row {
        flex-direction: column;
        gap: 0;
    }
    .msg-item {
        padding: 18px;
        gap: 12px;
    }
    .msg-avatar {
        width: 40px;
        height: 40px;
        font-size: 15px;
    }
    .msg-name {
        font-size: 14px;
    }
    .msg-text {
        font-size: 13px;
    }
    .btn-submit {
        width: 100%;
        padding: 12px;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- 返回首页 -->
    <div class="back-home">
        <a href="index.html">返回风之画廊</a>
    </div>

    <!-- 标题 -->
    <div class="page-header">
        <h1>留 言 板</h1>
        <p>写下你想说的话</p>
    </div>

    <!-- 留言统计 -->
    <div class="msg-count" id="msgCount">
        共有 <strong>0</strong> 条留言
    </div>

    <!-- 留言输入 -->
    <div class="msg-input-box">
        <h3>写下你的留言</h3>
        <div class="input-row">
            <input type="text" id="nameInput" placeholder="你的昵称">
        </div>
        <textarea id="contentInput" placeholder="说点什么吧... 分享你最喜欢的宫崎骏电影，或者你的观后感~"></textarea>
        <button class="btn-submit" id="submitBtn">发表留言</button>
    </div>

    <!-- 留言列表 -->
    <div class="msg-list" id="msgList"></div>

</div>

<script>
const nameInput = document.getElementById('nameInput');
const contentInput = document.getElementById('contentInput');
const submitBtn = document.getElementById('submitBtn');
const msgList = document.getElementById('msgList');
const msgCount = document.getElementById('msgCount');

// 根据昵称生成头像颜色索引
function getAvatarColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }
    return Math.abs(hash) % 8;
}

// 获取昵称首字
function getFirstChar(name) {
    return name.charAt(0).toUpperCase();
}

function getMsgData() {
    let data = localStorage.getItem('msgData');
    return data ? JSON.parse(data) : [];
}

function saveMsgData(arr) {
    localStorage.setItem('msgData', JSON.stringify(arr));
}

function updateCount() {
    const arr = getMsgData();
    msgCount.innerHTML = `共有 <strong>${arr.length}</strong> 条留言`;
}

function renderMsg() {
    let arr = getMsgData();
    updateCount();
    
    if (arr.length === 0) {
        msgList.innerHTML = `
            <div class="empty-tip">
                <div class="empty-icon">💬</div>
                <p>还没有留言</p>
                <p class="empty-sub">快来发表第一条留言吧~</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    arr.forEach((item, index) => {
        const colorIdx = getAvatarColor(item.name);
        const firstChar = getFirstChar(item.name);
        html += `
            <div class="msg-item">
                <div class="msg-avatar avatar-color-${colorIdx}">${firstChar}</div>
                <div class="msg-content-wrap">
                    <div class="msg-header">
                        <span class="msg-name">${escapeHtml(item.name)}</span>
                        <span class="msg-time">${item.time}</span>
                    </div>
                    <div class="msg-text">${escapeHtml(item.content)}</div>
                    <button class="btn-del" data-index="${index}">删除</button>
                </div>
            </div>
        `;
    });
    msgList.innerHTML = html;
    
    document.querySelectorAll('.btn-del').forEach(btn => {
        btn.onclick = function() {
            let idx = this.dataset.index;
            let arr = getMsgData();
            arr.splice(idx, 1);
            saveMsgData(arr);
            renderMsg();
        };
    });
}

// HTML转义，防止XSS
function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

submitBtn.onclick = function() {
    let name = nameInput.value.trim();
    let content = contentInput.value.trim();
    
    if (!name) {
        alert('请输入昵称');
        nameInput.focus();
        return;
    }
    if (!content) {
        alert('请输入留言内容');
        contentInput.focus();
        return;
    }
    
    let time = new Date().toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });
    
    let arr = getMsgData();
    arr.unshift({ name, content, time });
    saveMsgData(arr);
    
    nameInput.value = '';
    contentInput.value = '';
    renderMsg();
    
    // 提交后滚动到留言列表
    msgList.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

// 回车快捷提交（Ctrl+Enter）
contentInput.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') {
        submitBtn.click();
    }
});

renderMsg();
</script>

</body>
</html>
